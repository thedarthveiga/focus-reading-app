name: CI

on:
  workflow_dispatch: {}
  workflow_call: {}
  push:
    branches:
      - develop
      - 'release/**'
      - main
      - 'feature/**'
  pull_request:
    branches:
      - develop
      - 'release/**'
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Quality Gates ──────────────────────────────────────────────────────────
  quality:
    name: Type-check, Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  # ─── Architecture Tests ─────────────────────────────────────────────────────
  architecture:
    name: Architecture boundary tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:arch

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  # ─── Integration Tests (HTTP — stub adapters) ───────────────────────────────
  integration-tests:
    name: Integration tests (in-memory)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:integration

  # ─── DynamoDB Integration (LocalStack) ──────────────────────────────────────
  integration-dynamo:
    name: DynamoDB integration (LocalStack)
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      localstack:
        image: localstack/localstack:3.3
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb
          DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DYNAMO_ENDPOINT: http://localhost:4566
      DYNAMO_TABLE_NAME: focus-reading-test
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Create DynamoDB table on LocalStack
        run: |
          DYNAMO_TABLE_NAME=focus-reading-test npx ts-node infra/scripts/createTable.ts
      - run: npm run test:integration

  # ─── Coverage Gate ──────────────────────────────────────────────────────────
  coverage:
    name: Coverage (MVP 20%)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: TypeScript production build
    runs-on: ubuntu-latest
    needs: [architecture, coverage, integration-dynamo]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─── Docker Build & Smoke Test ──────────────────────────────────────────────
  docker:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: focus-reading-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — /health must return 200
        run: |
          docker run -d \
            --name api-smoke \
            -p 3001:3000 \
            -e NODE_ENV=production \
            focus-reading-api:${{ github.sha }}
          sleep 8
          curl -f http://localhost:3001/health \
            || (echo "SMOKE TEST FAILED" && docker logs api-smoke && exit 1)
          docker stop api-smoke
